<script src="/js/script.js" defer></script>
    <script>
    (function () {
      'use strict';

      /* ------------------------------------------------
         1. DATA LOADING
      ------------------------------------------------ */
      var DATA_URL = '/data/pizzor.json';
      var allaPizzerior = []; // grupperad struktur
      var currentScope = { type: 'country', value: null };
      var omradesInsikterScope = null;
      var lokalKanslaStad = null;
      var snabbFaktaIndex = 0;
      var jamforScopeA = null;
      var jamforScopeB = null;

      fetch(DATA_URL)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (flatData) {
          allaPizzerior = grupperaPizzerior(flatData);
          byggScopeKnappar(flatData);
          renderaStatistik();
        })
        .catch(function (err) {
          var el = document.getElementById('stat-status');
          if (el) {
            el.textContent = 'Kunde inte ladda data. Försök igen senare.';
            el.classList.add('stat-status--error');
          }
          console.error('Statistik: kunde inte ladda pizzor.json', err);
        });

      /* ------------------------------------------------
         2. GRUPPERA FLAT DATA → PIZZERIOR
      ------------------------------------------------ */
      function grupperaPizzerior(rows) {
        var map = {};
        rows.forEach(function (row) {
          var key = row.pizzeria;
          if (!map[key]) {
            map[key] = {
              pizzeria: row.pizzeria,
              adress:   row.adress   || '',
              omrade:   row.omrade   || '',
              stad:     row.stad     || '',
              telefon:  row.telefon  || '',
              hemsida:  row.hemsida  || '',
              pizzor:   []
            };
          }
          if (row.pizza_namn) {
            map[key].pizzor.push({
              namn:         row.pizza_namn,
              pris:         row.pris,
              ingredienser: Array.isArray(row.ingredienser) ? row.ingredienser : []
            });
          }
        });
        return Object.values(map);
      }

      /* ------------------------------------------------
         3. SCOPE KNAPPAR
      ------------------------------------------------ */
      function byggScopeKnappar(flatData) {
        var stader = [];
        var omraden = [];
        flatData.forEach(function (row) {
          if (row.stad   && stader.indexOf(row.stad) === -1)   stader.push(row.stad);
          if (row.omrade && omraden.indexOf(row.omrade) === -1) omraden.push(row.omrade);
        });
        stader.sort();
        omraden.sort();

        var wrap = document.getElementById('stat-scope-knappar');
        if (!wrap) return;

        function skapaKnapp(label, type, value) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'stat-scope-btn';
          btn.textContent = label;
          btn.dataset.scopeKey = type + ':' + (value || '');
          if (type === 'country') btn.classList.add('aktiv');
          btn.addEventListener('click', function () {
            currentScope = { type: type, value: value };
            markeraAktivScopeKnapp();
            renderaStatistik();
          });
          wrap.appendChild(btn);
        }

        skapaKnapp('🌍 Alla', 'country', null);
        stader.forEach(function (s) { skapaKnapp('🏙 ' + s, 'city', s); });
        omraden.forEach(function (o) { skapaKnapp('📍 ' + o, 'area', o); });
      }

      /* ------------------------------------------------
         4. FILTRERA PIZZERIOR
      ------------------------------------------------ */
      function filtreraPizzerior(scope) {
        if (!scope.value) return allaPizzerior;
        return allaPizzerior.filter(function (p) {
          return p.stad === scope.value || p.omrade === scope.value;
        });
      }

      function scopeEtikett(scope) {
        if (!scope || !scope.value) return 'Hela databasen';
        return scope.value;
      }

      function hamtaScopeAlternativ() {
        var stader = [];
        var omraden = [];

        allaPizzerior.forEach(function (p) {
          if (p.stad && stader.indexOf(p.stad) === -1) stader.push(p.stad);
          if (p.omrade && omraden.indexOf(p.omrade) === -1) omraden.push(p.omrade);
        });

        stader.sort();
        omraden.sort();

        var out = [{ key: 'country:', type: 'country', value: null, label: 'Hela databasen' }];
        stader.forEach(function (s) { out.push({ key: 'city:' + s, type: 'city', value: s, label: 'Stad: ' + s }); });
        omraden.forEach(function (o) { out.push({ key: 'area:' + o, type: 'area', value: o, label: 'Område: ' + o }); });
        return out;
      }

      function scopeNyckel(scope) {
        var typ = (scope && scope.type) ? scope.type : 'country';
        var value = (scope && scope.value) ? scope.value : '';
        return typ + ':' + value;
      }

      function markeraAktivScopeKnapp() {
        var wrap = document.getElementById('stat-scope-knappar');
        if (!wrap) return;
        var aktivNyckel = scopeNyckel(currentScope);
        wrap.querySelectorAll('.stat-scope-btn').forEach(function (b) {
          b.classList.toggle('aktiv', b.dataset.scopeKey === aktivNyckel);
        });
      }

      function skapaScopeFranNyckel(key) {
        var parts = String(key || '').split(':');
        var typ = parts[0] || 'country';
        var value = parts.slice(1).join(':') || null;
        return { type: typ, value: value };
      }

      /* ------------------------------------------------
         5. BERÄKNA STATISTIK
      ------------------------------------------------ */
      function snitt(arr) {
        if (!arr.length) return 0;
        return arr.reduce(function (s, v) { return s + v; }, 0) / arr.length;
      }

      function normaliseraNamn(namn) {
        return String(namn || '')
          .toLowerCase()
          .trim()
          .replace(/\s+/g, ' ');
      }

      function beraknaStatistik(dataset) {
        var allaPizzor = dataset.reduce(function (acc, p) {
          return acc.concat(p.pizzor);
        }, []);
        var priser = allaPizzor
          .map(function (p) { return p.pris; })
          .filter(function (v) { return typeof v === 'number'; });

        /* snitt per pizzeria */
        var pizzeriorMedPris = dataset
          .map(function (p) {
            var ps = p.pizzor.map(function (pi) { return pi.pris; }).filter(function (v) { return typeof v === 'number'; });
            var snittExakt = ps.length ? snitt(ps) : null;
            var varians = null;
            var stdAvvikelse = null;
            if (ps.length > 1 && snittExakt != null) {
              varians = ps.reduce(function (sum, v) {
                var diff = v - snittExakt;
                return sum + (diff * diff);
              }, 0) / ps.length;
              stdAvvikelse = Math.sqrt(varians);
            }
            return {
              pizzeria: p.pizzeria,
              adress: p.adress || '',
              omrade: p.omrade,
              stad: p.stad,
              lagstaPris: ps.length ? Math.min.apply(null, ps) : null,
              snittPrisExakt: snittExakt,
              snittPris: snittExakt != null ? Math.round(snittExakt) : null,
              antalPizzor: p.pizzor.length,
              valueScore: snittExakt ? (p.pizzor.length / snittExakt) : null,
              prisStdAvvikelse: stdAvvikelse,
              prisVariation: ps.length ? (Math.max.apply(null, ps) - Math.min.apply(null, ps)) : null
            };
          })
          .filter(function (p) { return p.snittPris !== null; });

        pizzeriorMedPris.sort(function (a, b) { return a.snittPrisExakt - b.snittPrisExakt; });

        var pizzeriorEfterLagsta = pizzeriorMedPris
          .slice()
          .filter(function (p) { return p.lagstaPris != null; })
          .sort(function (a, b) {
            if (a.lagstaPris !== b.lagstaPris) return a.lagstaPris - b.lagstaPris;
            return a.snittPrisExakt - b.snittPrisExakt;
          });

        var sorteradePriser = priser.slice().sort(function (a, b) { return a - b; });

        function percentil(sorted, p) {
          if (!sorted.length) return null;
          if (sorted.length === 1) return sorted[0];
          var pos = (sorted.length - 1) * p;
          var lower = Math.floor(pos);
          var upper = Math.ceil(pos);
          if (lower === upper) return sorted[lower];
          var vikt = pos - lower;
          return sorted[lower] + (sorted[upper] - sorted[lower]) * vikt;
        }

        var medianPris = sorteradePriser.length ? Math.round(percentil(sorteradePriser, 0.5)) : null;
        var kvartil1 = sorteradePriser.length ? Math.round(percentil(sorteradePriser, 0.25)) : null;
        var kvartil3 = sorteradePriser.length ? Math.round(percentil(sorteradePriser, 0.75)) : null;
        var prisbredd = (priser.length ? (Math.max.apply(null, priser) - Math.min.apply(null, priser)) : null);
        var andelUnder100 = priser.length
          ? Math.round((priser.filter(function (v) { return v <= 100; }).length / priser.length) * 100)
          : null;
        var andelOver150 = priser.length
          ? Math.round((priser.filter(function (v) { return v >= 150; }).length / priser.length) * 100)
          : null;

        var pizzaNamnMap = {};
        var pizzaDisplayMap = {};
        allaPizzor.forEach(function (p) {
          if (!p.namn) return;
          var key = normaliseraNamn(p.namn);
          if (!key) return;
          pizzaNamnMap[key] = (pizzaNamnMap[key] || 0) + 1;
          if (!pizzaDisplayMap[key]) pizzaDisplayMap[key] = p.namn.trim();
        });

        var vanligastePizzatyper = Object.keys(pizzaNamnMap)
          .map(function (k) {
            return { namn: pizzaDisplayMap[k], antal: pizzaNamnMap[k] };
          })
          .sort(function (a, b) { return b.antal - a.antal; })
          .slice(0, 30);

        var valueRanking = pizzeriorMedPris
          .slice()
          .filter(function (p) { return p.valueScore != null; })
          .sort(function (a, b) { return b.valueScore - a.valueScore; });

        var jamnastPizzeria = pizzeriorMedPris
          .slice()
          .filter(function (p) { return p.prisStdAvvikelse != null; })
          .sort(function (a, b) { return a.prisStdAvvikelse - b.prisStdAvvikelse; })[0] || null;

        var mestSpretigPizzeria = pizzeriorMedPris
          .slice()
          .filter(function (p) { return p.prisStdAvvikelse != null; })
          .sort(function (a, b) { return b.prisStdAvvikelse - a.prisStdAvvikelse; })[0] || null;

        /* ingrediensräkning */
        var ingMap = {};
        allaPizzor.forEach(function (p) {
          p.ingredienser.forEach(function (ing) {
            var k = ing.toLowerCase().trim();
            ingMap[k] = (ingMap[k] || 0) + 1;
          });
        });
        var topIng = Object.keys(ingMap)
          .map(function (k) { return { namn: k, antal: ingMap[k] }; })
          .sort(function (a, b) { return b.antal - a.antal; })
          .slice(0, 50);

        /* ingrediens-par */
        var parMap = {};
        var TRIVIAL = { 'tomatsås': true, 'ost': true, 'mozzarella': true };
        allaPizzor.forEach(function (p) {
          var ings = p.ingredienser
            .map(function (i) { return i.toLowerCase().trim(); })
            .filter(function (i) { return !TRIVIAL[i]; });
          for (var a = 0; a < ings.length; a++) {
            for (var b = a + 1; b < ings.length; b++) {
              var pair = ings[a] < ings[b] ? ings[a] + ' + ' + ings[b] : ings[b] + ' + ' + ings[a];
              parMap[pair] = (parMap[pair] || 0) + 1;
            }
          }
        });
        var topPar = Object.keys(parMap)
          .map(function (k) { return { namn: k, antal: parMap[k] }; })
          .sort(function (a, b) { return b.antal - a.antal; })
          .slice(0, 20);

        var typiskAntalPizzor = null;
        var typisktPris = null;

        if (pizzeriorMedPris.length) {
          var antalMap = {};
          pizzeriorMedPris.forEach(function (p) {
            var k = String(p.antalPizzor);
            antalMap[k] = (antalMap[k] || 0) + 1;
          });
          typiskAntalPizzor = Number(Object.keys(antalMap).sort(function (a, b) {
            var diff = antalMap[b] - antalMap[a];
            if (diff !== 0) return diff;
            return Number(a) - Number(b);
          })[0]);
        }

        if (priser.length) {
          var prisMap = {};
          priser.forEach(function (v) {
            var k = String(v);
            prisMap[k] = (prisMap[k] || 0) + 1;
          });
          typisktPris = Number(Object.keys(prisMap).sort(function (a, b) {
            var diff = prisMap[b] - prisMap[a];
            if (diff !== 0) return diff;
            return Number(a) - Number(b);
          })[0]);
        }

        var maxAntal = pizzeriorMedPris.length ? Math.max.apply(null, pizzeriorMedPris.map(function (p) { return p.antalPizzor; })) : null;
        var minAntal = pizzeriorMedPris.length ? Math.min.apply(null, pizzeriorMedPris.map(function (p) { return p.antalPizzor; })) : null;

        var billigastMedFlest = null;
        var dyrastMedMinst = null;

        if (maxAntal !== null) {
          var kandidaterFlest = pizzeriorMedPris
            .filter(function (p) { return p.antalPizzor === maxAntal; })
            .sort(function (a, b) { return a.snittPrisExakt - b.snittPrisExakt; });
          billigastMedFlest = kandidaterFlest[0] || null;
        }

        if (minAntal !== null) {
          var kandidaterMinst = pizzeriorMedPris
            .filter(function (p) { return p.antalPizzor === minAntal; })
            .sort(function (a, b) { return b.snittPrisExakt - a.snittPrisExakt; });
          dyrastMedMinst = kandidaterMinst[0] || null;
        }

        return {
          antalPizzerior: dataset.length,
          antalPizzor:    allaPizzor.length,
          snittPris:      priser.length ? Math.round(snitt(priser)) : null,
          minPris:        priser.length ? Math.min.apply(null, priser) : null,
          maxPris:        priser.length ? Math.max.apply(null, priser) : null,
          medianPris:     medianPris,
          kvartil1:       kvartil1,
          kvartil3:       kvartil3,
          prisbredd:      prisbredd,
          andelUnder100:  andelUnder100,
          andelOver150:   andelOver150,
          pizzeriorMedPris: pizzeriorMedPris,
          pizzeriorEfterLagsta: pizzeriorEfterLagsta,
          billigastRanking: pizzeriorMedPris.slice(0, 20),
          dyrastRanking:    pizzeriorMedPris.slice(-20).reverse(),
          flestPizzor:      dataset.slice().sort(function (a, b) { return b.pizzor.length - a.pizzor.length; }).slice(0, 20),
          minstPizzor:      dataset.slice().sort(function (a, b) { return a.pizzor.length - b.pizzor.length; }).slice(0, 20),
          topIngredienser:  topIng,
          topIngrediensPar: topPar,
          vanligastePizzatyper: vanligastePizzatyper,
          valueRanking: valueRanking.slice(0, 20),
          jamnastPizzeria: jamnastPizzeria,
          mestSpretigPizzeria: mestSpretigPizzeria,
          typiskAntalPizzor: typiskAntalPizzor,
          typisktPris: typisktPris,
          billigastMedFlest: billigastMedFlest,
          dyrastMedMinst: dyrastMedMinst,
          menyKvalitetRanking: (function () {
            var snittPrisAllt = priser.length ? snitt(priser) : 130;
            return dataset
              .filter(function (p) { return p.pizzor.length >= 5; })
              .map(function (p) {
                /* Variation: unika ingredienser / antal pizzor, skala 0-100 */
                var ingSet = {};
                p.pizzor.forEach(function (pi) {
                  (pi.ingredienser || []).forEach(function (i) { ingSet[i.toLowerCase().trim()] = true; });
                });
                var unikaIng = Object.keys(ingSet).length;
                var varScore = Math.min(100, (unikaIng / p.pizzor.length) * 20);

                /* Prisbalans: låg stdAvvikelse relativt till snitt = jämna priser */
                var ps = p.pizzor.map(function (pi) { return pi.pris; }).filter(function (v) { return typeof v === 'number'; });
                var sn = ps.length ? snitt(ps) : 0;
                var std = 0;
                if (ps.length > 1 && sn) {
                  std = Math.sqrt(ps.reduce(function (s, v) { return s + Math.pow(v - sn, 2); }, 0) / ps.length);
                }
                var balansScore = sn ? Math.max(0, 100 - (std / sn) * 100) : 50;

                /* Prisnivå: billigare än snittet = högre poäng */
                var prisScore = sn ? Math.max(0, Math.min(100, 100 - ((sn - snittPrisAllt) / snittPrisAllt) * 100)) : 50;

                var total = Math.round(varScore * 0.4 + balansScore * 0.3 + prisScore * 0.3);
                var betyg = total >= 80 ? 'Utmärkt' : total >= 65 ? 'Bra' : total >= 50 ? 'Medel' : 'Svag';
                return {
                  pizzeria: p.pizzeria,
                  omrade: p.omrade,
                  stad: p.stad,
                  score: total,
                  betyg: betyg,
                  unikaIng: unikaIng,
                  antalPizzor: p.pizzor.length,
                  snittPris: Math.round(sn)
                };
              })
              .sort(function (a, b) { return b.score - a.score; })
              .slice(0, 20);
          })(),
          outliers: (function () {
            /* Gruppera alla pizzor per normaliserat namn */
            var namnMap = {};
            dataset.forEach(function (p) {
              p.pizzor.forEach(function (pi) {
                if (typeof pi.pris !== 'number') return;
                var key = normaliseraNamn(pi.namn);
                if (!namnMap[key]) namnMap[key] = [];
                namnMap[key].push({ pizzeria: p.pizzeria, omrade: p.omrade, stad: p.stad, namn: pi.namn, pris: pi.pris });
              });
            });
            var result = [];
            Object.keys(namnMap).forEach(function (key) {
              var grupp = namnMap[key];
              if (grupp.length < 4) return;
              var ps = grupp.map(function (x) { return x.pris; });
              var m = snitt(ps);
              var std = Math.sqrt(ps.reduce(function (s, v) { return s + Math.pow(v - m, 2); }, 0) / ps.length);
              if (std < 5) return;
              grupp.forEach(function (x) {
                var z = (x.pris - m) / std;
                if (Math.abs(z) >= 1.8) {
                  result.push({
                    namn: x.namn,
                    pizzeria: x.pizzeria,
                    omrade: x.omrade,
                    stad: x.stad,
                    pris: x.pris,
                    snittForNamn: Math.round(m),
                    diff: Math.round(x.pris - m),
                    z: z
                  });
                }
              });
            });
            result.sort(function (a, b) { return Math.abs(b.z) - Math.abs(a.z); });
            return result.slice(0, 20);
          })(),
          ingrediensDensitet: (function () {
            /* Snitt antal ingredienser per pizza, per pizzeria */
            var totalaIngCount = 0;
            var totalaIngPizzor = 0;
            var ranking = dataset
              .filter(function (p) { return p.pizzor.length >= 3; })
              .map(function (p) {
                var counts = p.pizzor.map(function (pi) {
                  return Array.isArray(pi.ingredienser) ? pi.ingredienser.length : 0;
                });
                totalaIngCount += counts.reduce(function (s, v) { return s + v; }, 0);
                totalaIngPizzor += counts.length;
                var m = snitt(counts);
                var mx = Math.max.apply(null, counts);
                var pizzaMedMest = p.pizzor.reduce(function (best, pi) {
                  return (Array.isArray(pi.ingredienser) && pi.ingredienser.length > (Array.isArray(best.ingredienser) ? best.ingredienser.length : -1)) ? pi : best;
                }, p.pizzor[0]);
                return {
                  pizzeria: p.pizzeria,
                  omrade: p.omrade,
                  stad: p.stad,
                  snittIng: Math.round(m * 10) / 10,
                  maxIng: mx,
                  pizzaMedMest: pizzaMedMest ? pizzaMedMest.namn : ''
                };
              })
              .sort(function (a, b) { return b.snittIng - a.snittIng; });
            return {
              ranking: ranking.slice(0, 20),
              globaltSnitt: totalaIngPizzor > 0 ? Math.round((totalaIngCount / totalaIngPizzor) * 10) / 10 : 0
            };
          })(),
          prisPerIngrediens: (function () {
            /* Rå value per pizza: pris delat med antal ingredienser (minst 4 ingredienser krävs) */
            var perPizza = [];
            dataset.forEach(function (p) {
              p.pizzor.forEach(function (pi) {
                if (typeof pi.pris !== 'number') return;
                var antalIng = Array.isArray(pi.ingredienser) ? pi.ingredienser.length : 0;
                if (antalIng <= 3) return;
                perPizza.push({
                  pizzeria: p.pizzeria,
                  omrade: p.omrade,
                  stad: p.stad,
                  pizzaNamn: pi.namn,
                  pris: pi.pris,
                  antalIng: antalIng,
                  prisPerIng: pi.pris / antalIng
                });
              });
            });
            if (!perPizza.length) {
              return { dyrast: [], billigast: [], globalMax: null, globalMin: null };
            }
            perPizza.sort(function (a, b) { return b.prisPerIng - a.prisPerIng; });
            return {
              dyrast: perPizza.slice(0, 20),
              billigast: perPizza.slice(-20).reverse(),
              globalMax: perPizza[0],
              globalMin: perPizza[perPizza.length - 1]
            };
          })(),
          pizzaMeter: (function () {
            var antal = allaPizzor.length;
            var meter = Math.round(antal * 0.3);
            return {
              antalPizzor: antal,
              meter: meter,
              kilometer: Math.round((meter / 1000) * 100) / 100
            };
          })(),
          eatTime: (function () {
            var antal = allaPizzor.length;
            var years = antal / 365.25;
            return {
              antalPizzor: antal,
              years: Math.round(years * 10) / 10,
              days: antal
            };
          })(),
          prisPerBokstavNamn: (function () {
            var prisPerBokstav = pizzeriorMedPris
              .map(function (p) {
                if (!p || p.snittPrisExakt == null || !p.pizzeria) return null;
                var bokstaver = p.pizzeria.replace(/\s/g, '').length;
                if (!bokstaver) return null;
                return p.snittPrisExakt / bokstaver;
              })
              .filter(function (v) { return typeof v === 'number' && !isNaN(v); });

            if (!prisPerBokstav.length) return null;

            return {
              snitt: Math.round(snitt(prisPerBokstav) * 10) / 10,
              antal: prisPerBokstav.length
            };
          })(),
          prisPerVokalNamn: (function () {
            var prisPerVokal = pizzeriorMedPris
              .map(function (p) {
                if (!p || p.snittPrisExakt == null || !p.pizzeria) return null;
                var vowels = (p.pizzeria.match(/[aeiouyåäö]/gi) || []).length;
                if (!vowels) return null;
                return p.snittPrisExakt / vowels;
              })
              .filter(function (v) { return typeof v === 'number' && !isNaN(v); });

            if (!prisPerVokal.length) return null;

            return {
              snitt: Math.round(snitt(prisPerVokal) * 10) / 10,
              antal: prisPerVokal.length
            };
          })(),
          prisPerKonsonantNamn: (function () {
            var prisPerKonsonant = pizzeriorMedPris
              .map(function (p) {
                if (!p || p.snittPrisExakt == null || !p.pizzeria) return null;
                var namn = p.pizzeria.toLowerCase();
                var bokstaver = (namn.match(/[a-zåäö]/g) || []).length;
                var vowels = (namn.match(/[aeiouyåäö]/g) || []).length;
                var konsonanter = bokstaver - vowels;
                if (!konsonanter) return null;
                return p.snittPrisExakt / konsonanter;
              })
              .filter(function (v) { return typeof v === 'number' && !isNaN(v); });

            if (!prisPerKonsonant.length) return null;

            return {
              snitt: Math.round(snitt(prisPerKonsonant) * 10) / 10,
              antal: prisPerKonsonant.length
            };
          })(),
          prisPerAdressLangd: (function () {
            var prisPerAdress = pizzeriorMedPris
              .map(function (p) {
                if (!p || p.snittPrisExakt == null) return null;
                var adressLangd = String(p.adress || '').length;
                if (!adressLangd) return null;
                return p.snittPrisExakt / adressLangd;
              })
              .filter(function (v) { return typeof v === 'number' && !isNaN(v); });

            if (!prisPerAdress.length) return null;

            return {
              snitt: Math.round(snitt(prisPerAdress) * 10) / 10,
              antal: prisPerAdress.length
            };
          })(),
          prisVsPostnummer: (function () {
            var postMap = {};
            pizzeriorMedPris.forEach(function (p) {
              if (!p || p.snittPrisExakt == null) return;
              var adress = String(p.adress || '');
              var m = adress.match(/\b(\d{3})\s?(\d{2})\b/);
              if (!m) return;
              var postnr = m[1] + ' ' + m[2];
              if (!postMap[postnr]) postMap[postnr] = [];
              postMap[postnr].push(p.snittPrisExakt);
            });

            var ranking = Object.keys(postMap)
              .map(function (postnr) {
                var arr = postMap[postnr];
                return {
                  postnr: postnr,
                  snittPrisExakt: snitt(arr),
                  snittPris: Math.round(snitt(arr)),
                  antal: arr.length
                };
              })
              .sort(function (a, b) { return b.snittPrisExakt - a.snittPrisExakt; });

            if (!ranking.length) return null;

            return {
              ranking: ranking,
              dyrast: ranking[0],
              billigast: ranking[ranking.length - 1],
              antalPostnummer: ranking.length
            };
          })(),
          prisVsOmradeNamnLangd: (function () {
            var omradeRows = pizzeriorMedPris
              .filter(function (p) { return p && p.snittPrisExakt != null && p.omrade; })
              .map(function (p) {
                var namn = String(p.omrade).trim();
                var langd = namn.replace(/\s/g, '').length;
                return {
                  omrade: namn,
                  langd: langd,
                  pris: p.snittPrisExakt
                };
              })
              .filter(function (x) { return x.langd > 0; });

            if (omradeRows.length < 2) return null;

            var langder = omradeRows.map(function (x) { return x.langd; }).sort(function (a, b) { return a - b; });
            var mid = Math.floor(langder.length / 2);
            var median = langder.length % 2 === 0
              ? (langder[mid - 1] + langder[mid]) / 2
              : langder[mid];

            var korta = omradeRows.filter(function (x) { return x.langd <= median; });
            var langa = omradeRows.filter(function (x) { return x.langd > median; });

            if (!korta.length || !langa.length) return null;

            var kortSnitt = snitt(korta.map(function (x) { return x.pris; }));
            var langSnitt = snitt(langa.map(function (x) { return x.pris; }));

            return {
              granskortLangd: median,
              kortSnitt: Math.round(kortSnitt * 10) / 10,
              langSnitt: Math.round(langSnitt * 10) / 10,
              diff: Math.round((langSnitt - kortSnitt) * 10) / 10,
              antalKorta: korta.length,
              antalLanga: langa.length
            };
          })(),
          pizzaDNA: (function () {
            var TRIVIAL = ['tomatsås', 'ost', 'mozzarella', 'tomatsas'];
            return dataset
              .filter(function (p) { return p.pizzor.length >= 3; })
              .map(function (p) {
                /* Räkna ingrediensfrekvens för denna pizzeria */
                var freq = {};
                p.pizzor.forEach(function (pi) {
                  if (!Array.isArray(pi.ingredienser)) return;
                  pi.ingredienser.forEach(function (ing) {
                    var k = ing.toLowerCase().trim();
                    if (TRIVIAL.indexOf(k) !== -1) return;
                    freq[k] = (freq[k] || 0) + 1;
                  });
                });
                var top5 = Object.keys(freq)
                  .map(function (k) { return { namn: k, antal: freq[k] }; })
                  .sort(function (a, b) { return b.antal - a.antal; })
                  .slice(0, 5);
                /* Bygg en enkel profilmening */
                var profilOrd = top5.map(function (x) { return x.namn; });
                var profil = profilOrd.length
                  ? profilOrd.slice(0, -1).join(', ') + (profilOrd.length > 1 ? ' & ' + profilOrd[profilOrd.length - 1] : profilOrd[0])
                  : '';
                return {
                  pizzeria: p.pizzeria,
                  omrade: p.omrade,
                  stad: p.stad,
                  top5: top5,
                  profil: profil,
                  antalPizzor: p.pizzor.length
                };
              })
              .sort(function (a, b) { return b.antalPizzor - a.antalPizzor; });
          })(),
          ovanligaKombinationer: (function () {
            var TRIVIAL = ['tomats\u00e5s', 'ost', 'mozzarella', 'tomatsas'];
            /* R\u00e4kna individuell frekvens och parfrekvens p\u00e5 allaPizzor */
            var ingFreq = {};
            var parFreq = {};
            var parPizzeria = {};
            var totalPizzor = 0;
            dataset.forEach(function (p) {
              p.pizzor.forEach(function (pi) {
                if (!Array.isArray(pi.ingredienser)) return;
                totalPizzor++;
                var ings = pi.ingredienser
                  .map(function (x) { return x.toLowerCase().trim(); })
                  .filter(function (x) { return TRIVIAL.indexOf(x) === -1; });
                /* Individuell frekvens */
                var seen = {};
                ings.forEach(function (k) {
                  if (!seen[k]) { seen[k] = true; ingFreq[k] = (ingFreq[k] || 0) + 1; }
                });
                /* Parfrekvens */
                for (var i = 0; i < ings.length; i++) {
                  for (var j = i + 1; j < ings.length; j++) {
                    var a = ings[i] < ings[j] ? ings[i] : ings[j];
                    var b = ings[i] < ings[j] ? ings[j] : ings[i];
                    var key = a + '|||' + b;
                    parFreq[key] = (parFreq[key] || 0) + 1;
                    if (!parPizzeria[key]) parPizzeria[key] = p.pizzeria;
                  }
                }
              });
            });
            if (totalPizzor === 0) return [];
            /* Ber\u00e4kna PMI-liknande ovanlighetsscore */
            /* score = count(a,b) / (freq(a) * freq(b)) * totalPizzor */
            /* H\u00f6g score = de tv\u00e5 syns OFTARE tillsammans \u00e4n slumpen f\u00f6ruts\u00e4ger */
            /* Filtrera: minst 3 pizzor med paret, ingen trivial ingrediens */
            var ROLIGA = ['banan', 'ananas', 'curry', 'r\u00e4kor', 'majs', 'kebab',
              'bacon', 'jalape\u00f1o', 'jalapeno', 'chili', 'r\u00f6dbeta', 'p\u00e4ron',
              'mango', 'kokos', 'persika', 'jordgubbar', 'fig', 'dadlar'];
            var result = [];
            Object.keys(parFreq).forEach(function (key) {
              var count = parFreq[key];
              if (count < 3) return;
              var parts = key.split('|||');
              var a = parts[0], b = parts[1];
              /* Kräv minst en rolig/ovanlig ingrediens */
              var harRolig = ROLIGA.some(function (r) { return a.indexOf(r) !== -1 || b.indexOf(r) !== -1; });
              if (!harRolig) return;
              var fa = ingFreq[a] || 1;
              var fb = ingFreq[b] || 1;
              var score = (count * totalPizzor) / (fa * fb);
              result.push({ a: a, b: b, count: count, score: score, pizzeria: parPizzeria[key] || '' });
            });
            result.sort(function (x, y) { return y.score - x.score; });
            return result.slice(0, 20);
          })(),
          ingrediensBingo: (function () {
            /* Räkna unika ingrediens-kombinationer */
            var kombinationer = {};
            allaPizzor.forEach(function (pizza) {
              if (!Array.isArray(pizza.ingredienser) || pizza.ingredienser.length < 2) return;
              var sorted = pizza.ingredienser.map(function (i) { return i.toLowerCase().trim(); }).sort();
              var key = sorted.join('|');
              kombinationer[key] = (kombinationer[key] || 0) + 1;
            });
            var unika = Object.keys(kombinationer).length;
            /* Uppskatta möjliga kombinationer baserat på unika ingredienser */
            var allaIngredienser = {};
            allaPizzor.forEach(function (pizza) {
              if (Array.isArray(pizza.ingredienser)) {
                pizza.ingredienser.forEach(function (ing) {
                  allaIngredienser[ing.toLowerCase().trim()] = true;
                });
              }
            });
            var unique_ing_count = Object.keys(allaIngredienser).length;
            return {
              faktiska: unika,
              uniktaIngredienser: unique_ing_count
            };
          })()
        };
      }

      /* ------------------------------------------------
         6. RENDER
      ------------------------------------------------ */
      function renderaStatistik() {
        var dataset = filtreraPizzerior(currentScope);

        var totalStat = beraknaStatistik(allaPizzerior);

        /* Scope-titel */
        var titelEl = document.getElementById('stat-scope-titel');
        if (titelEl) {
          if (!currentScope.value) {
            titelEl.textContent = 'Visar statistik för hela databasen';
          } else {
            titelEl.textContent = 'Visar statistik för: ' + currentScope.value;
          }
        }

        var statusEl   = document.getElementById('stat-status');
        var sectionsEl = document.getElementById('stat-sections');

        if (dataset.length === 0) {
          if (statusEl) { statusEl.textContent = 'Inga pizzerior hittades för det valda området.'; statusEl.removeAttribute('hidden'); }
          if (sectionsEl) sectionsEl.hidden = true;
          return;
        }

        if (statusEl) statusEl.hidden = true;
        if (!sectionsEl) return;
        sectionsEl.hidden = false;
        sectionsEl.innerHTML = '';

        /* --- Länk till Random statistik --- */
        if (stat.pizzaMeter && stat.pizzaMeter.antalPizzor > 0) {
          sectionsEl.appendChild(skapaRandomStatistikLank());
        }

        /* --- Översikt --- */
        sectionsEl.appendChild(skapaOversiktKort(stat));

        /* --- Prisintervall --- */
        sectionsEl.appendChild(skapaPrisKort(stat));

        /* --- Snabba val --- */
        sectionsEl.appendChild(skapaSnabbaValKort(stat));

        /* --- Mest värde --- */
        if (stat.valueRanking && stat.valueRanking.length) {
          sectionsEl.appendChild(skapaValueScoreKort(stat));
        }

        /* --- Områdesinsikter --- */
        sectionsEl.appendChild(skapaOmradesInsikterKort(totalStat));

        /* --- Lokal känsla --- */
        sectionsEl.appendChild(skapaLokalKanslaKort());

        /* --- Snabba fakta --- */
        sectionsEl.appendChild(skapaSnabbFaktaKort(stat));

        /* --- Direkt jämförelse --- */
        sectionsEl.appendChild(skapaJamforelseKort());

        /* --- Typisk meny --- */
        sectionsEl.appendChild(skapaTypiskMenyKort(stat));

        /* --- Extrem-case --- */
        sectionsEl.appendChild(skapaExtremKort(stat));

        /* --- Billigaste pizzerior --- */
        if (stat.billigastRanking.length) {
          sectionsEl.appendChild(skapaRankingKort(
            '💸 Billigaste pizzerior',
            '🟢 Lägst snittpris',

            stat.dyrastRanking,

          ));
        }

        /* --- Störst utbud --- */

            '🍕 Störst utbud',
            '📋 Flest pizzor på menyn',
            'stat-card--blue',
            stat.flestPizzor,
            function (p) { return p.pizzor.length + ' pizzor'; },
            'Rankat efter antal pizzor i pizzerions meny. Top 20 med flest pizzor visas.'
          ));
        }

        /* --- Minst utbud --- */
        if (stat.minstPizzor && stat.minstPizzor.length) {
          sectionsEl.appendChild(skapaRankingKort(
            '🧩 Minst utbud',
            '📉 Färst pizzor på menyn',
            'stat-card--blue',
            stat.minstPizzor,
            function (p) { return p.pizzor.length + ' pizzor'; },
            'Rankat efter antal pizzor i pizzerions meny. Top 20 med färst pizzor visas.'
          ));

        /* --- Populära ingredienser --- */

        if (stat.prisPerIngrediens && stat.prisPerIngrediens.dyrast && stat.prisPerIngrediens.dyrast.length) {

        sectionsEl.appendChild(skapaKonsistensKort(stat));

        sectionsEl.appendChild(skapaLokalRankingKort());

        /* --- Random statistik rubrik --- */
        if (stat.pizzaMeter && stat.pizzaMeter.antalPizzor > 0) {
          sectionsEl.appendChild(skapaRandomStatistikRubrik());
        }

        /* --- Pris per bokstav i pizzerians namn --- */
        if (stat.prisPerBokstavNamn) {
          sectionsEl.appendChild(skapaPrisPerBokstavNamnKort(stat.prisPerBokstavNamn));
        }

        /* --- Pris vs antal vokaler i namnet --- */
        if (stat.prisPerVokalNamn) {
          sectionsEl.appendChild(skapaPrisPerVokalNamnKort(stat.prisPerVokalNamn));
        }

        /* --- Pris vs antal konsonanter --- */
        if (stat.prisPerKonsonantNamn) {
          sectionsEl.appendChild(skapaPrisPerKonsonantNamnKort(stat.prisPerKonsonantNamn));
        }

        /* --- Pris vs längd på adressen --- */
        if (stat.prisPerAdressLangd) {
          sectionsEl.appendChild(skapaPrisPerAdressLangdKort(stat.prisPerAdressLangd));
        }

        /* --- Pris vs postnummer --- */
        if (stat.prisVsPostnummer) {
          sectionsEl.appendChild(skapaPrisVsPostnummerKort(stat.prisVsPostnummer));
        }

        /* --- Pris vs område (kort vs långt namn) --- */
        if (stat.prisVsOmradeNamnLangd) {
          sectionsEl.appendChild(skapaPrisVsOmradeNamnLangdKort(stat.prisVsOmradeNamnLangd));
        }

        /* --- Pizza på rad (meter) --- */
        if (stat.pizzaMeter && stat.pizzaMeter.antalPizzor > 0) {
          sectionsEl.appendChild(skapaPizzaMeterKort(stat.pizzaMeter));
        }

        /* --- Hur lång tid att äta allt --- */
        if (stat.eatTime && stat.eatTime.antalPizzor > 0) {
          sectionsEl.appendChild(skapaEatTimeKort(stat.eatTime));
        }

        /* --- Ingrediens-bingo --- */
        if (stat.ingrediensBingo) {
          sectionsEl.appendChild(skapaIngrediensBingoKort(stat.ingrediensBingo));
        }
      }

      /* ------------------------------------------------
         7. KORTBYGGARE

      function skapaOversiktKort(stat) {

        var card = skapaKort('🆚 Direkt jämförelse', '📏 Skillnad i kronor och procent', 'stat-card--gold', 'Välj två geografiska urval (stad eller område). Snittpriset för varje urval beräknas och skillnaden visas i kronor och procent. Procenten räknas som ((A − B) / B) × 100.');

        var selectA = document.createElement('select');

        var selectB = document.createElement('select');
        selectB.className = 'stat-select';

        alternativ.forEach(function (opt) {
          var oa = document.createElement('option');
          oa.value = opt.key;
          oa.textContent = opt.label;
          if (opt.key === jamforScopeA) oa.selected = true;
          selectA.appendChild(oa);

          var ob = document.createElement('option');
          ob.value = opt.key;
          ob.textContent = opt.label;
          if (opt.key === jamforScopeB) ob.selected = true;
          selectB.appendChild(ob);

        controls.appendChild(selectA);
        controls.appendChild(selectB);
        card.appendChild(controls);

        var result = document.createElement('p');
        result.className = 'stat-text stat-compare-result';
        card.appendChild(result);

        function uppdateraJamforelse() {
          jamforScopeA = selectA.value;
          jamforScopeB = selectB.value;

          var scopeA = skapaScopeFranNyckel(jamforScopeA);
          var scopeB = skapaScopeFranNyckel(jamforScopeB);
          var statA = beraknaStatistik(filtreraPizzerior(scopeA));
          var statB = beraknaStatistik(filtreraPizzerior(scopeB));

          if (statA.snittPris == null || statB.snittPris == null || statB.snittPris === 0) {
            result.textContent = 'Jämförelsen saknar tillräckligt underlag.';
            return;
          }

          var diff = statA.snittPris - statB.snittPris;
          var pct = Math.round((diff / statB.snittPris) * 100);
          var riktning = diff >= 0 ? 'dyrare' : 'billigare';
          var pctText = (pct > 0 ? '+' : '') + pct + '%';
          var labelA = escHtml(scopeEtikett(scopeA));
          var labelB = escHtml(scopeEtikett(scopeB));
          var diffKr = Math.abs(diff) + ' kr';

          result.innerHTML =
            '<span class="stat-compare-place">' + labelA + '</span> är i snitt ' +

            '<span class="stat-compare-place">' + labelB + '</span> ' +
            '(<span class="stat-compare-kpi">≈ ' + pctText + '</span>).';
        }

        selectA.addEventListener('change', uppdateraJamforelse);
        selectB.addEventListener('change', uppdateraJamforelse);
        uppdateraJamforelse();

        return card;
      }

        card.appendChild(info);
        var fakta = document.createElement('p');
        fakta.className = 'stat-fact-small';
        fakta.textContent = 'Baserat på ' + data.uniktaIngredienser + ' unika ingredienser och ' + data.faktiska + ' faktiska kombinationer i databasen.';
        card.appendChild(fakta);
        return card;
      }

      function skapaPrisPerIngrediensKort(data) {
        var card = skapaKort('🍕 Pris per ingrediens', '💸 Rå value per pizza', 'stat-card--gold', 'Beräknas som pris ÷ antal ingredienser för varje pizza. Bara pizzor med fler än 3 ingredienser räknas med – annars snedvrids resultatet av t.ex. lasagne och sallader med få ingredienser.');
        var info = document.createElement('p');
        info.className = 'stat-fact-small';
        if (data.globalMax && data.globalMin) {
          info.textContent = 'Dyrast per ingrediens: ' + data.globalMax.prisPerIng.toFixed(1) + ' kr/ingrediens. Billigast: ' + data.globalMin.prisPerIng.toFixed(1) + ' kr/ingrediens.';
        } else {
          info.textContent = 'Ingen data tillgänglig för pris per ingrediens.';
        }
        card.appendChild(info);

        var ul = document.createElement('ul');
        ul.className = 'stat-rank-list';
        ul.setAttribute('role', 'list');
        data.dyrast.forEach(function (item, i) {
          var li = document.createElement('li');
          li.className = 'stat-rank-item';
          var posKlass = i < 3 ? ' stat-rank-pos--' + (i + 1) : '';
          var plats = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
          var sub = [item.omrade, item.stad].filter(Boolean).join(', ');
          var pizzeriaHref = pizzeriaLank(item.pizzeria);
          li.innerHTML =
            '<span class="stat-rank-pos' + posKlass + '">' + plats + '</span>' +
            '<span class="stat-rank-namn">' +
              escHtml(item.pizzaNamn) +
              '<span class="stat-rank-namn-sub"><a class="stat-rank-link" href="' + escHtml(pizzeriaHref) + '" aria-label="Visa meny för ' + escHtml(item.pizzeria) + '">' + escHtml(item.pizzeria) + (sub ? ', ' + escHtml(sub) : '') + '</a></span>' +
              '<span class="stat-rank-namn-sub">' + item.pris + ' kr, ' + item.antalIng + ' ingredienser</span>' +
            '</span>' +
            '<span class="stat-rank-pris">' + item.prisPerIng.toFixed(1) + ' kr/ing</span>';
          ul.appendChild(li);
        });
        card.appendChild(ul);
        return card;
      }

      function skapaOvanligaKombKort(lista) {
        var card = skapaKort('\uD83E\uDDEA Ovanliga kombinationer', '\uD83E\uDD2F Weird combos som faktiskt finns', 'stat-card--orange', 'Ingredienspar med minst en ovanlig ingrediens (banan, curry, r\u00e4kor\u2026) som f\u00f6rekommer mer s\u00e4llan \u00e4n slumpen f\u00f6rv\u00e4ntar. Sorterat efter ovanlighetsfaktor. Klicka f\u00f6r att se pizzerian.');
        var ul = document.createElement('ul');
        ul.className = 'stat-kombo-list';
        ul.setAttribute('role', 'list');
        lista.forEach(function (item) {
          var li = document.createElement('li');
          li.className = 'stat-kombo-item' + (item.pizzeria ? ' stat-kombo-item--link' : '');
          var inner =
            '<span class="stat-kombo-par">' +
              '<span class="stat-kombo-ing">' + escHtml(item.a) + '</span>' +
              '<span class="stat-kombo-plus">+</span>' +
              '<span class="stat-kombo-ing">' + escHtml(item.b) + '</span>' +
            '</span>' +
            '<span class="stat-kombo-count">' + item.count + ' pizzor</span>';
          if (item.pizzeria) {
            var a = document.createElement('a');
            a.href = pizzeriaLank(item.pizzeria);
            a.className = 'stat-kombo-link';
            a.setAttribute('aria-label', 'Visa ' + item.pizzeria);
            a.innerHTML = inner;
            li.appendChild(a);
          } else {
            li.innerHTML = inner;
          }
          ul.appendChild(li);
        });
        card.appendChild(ul);
        return card;
      }

      function skapaPizzaDNAKort(dnaLista) {
        var card = skapaKort('\uD83E\uDDE0 Pizza-DNA', '\uD83C\uDFB5 Signatur per pizzeria', 'stat-card--purple', 'Top 5 vanligaste ingredienser (exkl. tomats\u00e5s/ost/mozzarella) per pizzeria, sorterat efter menystorlek. Visar pizzerions signatursmak. Klicka f\u00f6r att se menyn.');
        var grid = document.createElement('div');
        grid.className = 'stat-dna-grid';
        dnaLista.forEach(function (p) {
          var item = document.createElement('a');
          item.className = 'stat-dna-item';
          item.href = pizzeriaLank(p.pizzeria);
          item.setAttribute('aria-label', 'Visa meny f\u00f6r ' + p.pizzeria);
          var sub = [p.omrade, p.stad].filter(Boolean).join(', ');
          var tagsHtml = p.top5.map(function (t) {
            var pct = Math.round((t.antal / p.antalPizzor) * 100);
            return '<span class="stat-dna-tag">' + escHtml(t.namn) + '<span class="stat-dna-pct">' + pct + '%</span></span>';
          }).join('');
          item.innerHTML =
            '<div class="stat-dna-namn">' + escHtml(p.pizzeria) +
              (sub ? '<span class="stat-dna-sub">' + escHtml(sub) + '</span>' : '') +
            '</div>' +
            '<div class="stat-dna-profil">' + escHtml(p.profil) + '</div>' +
            '<div class="stat-dna-tags">' + tagsHtml + '</div>';
          grid.appendChild(item);
        });
        card.appendChild(grid);
        return card;
      }

      function formateraInfoText(infoText) {
        var text = String(infoText || '').trim();
        if (!text) return text;
        if (!/[.!?]$/.test(text)) text += '.';
        return text + ' Tolkning: använd siffran som en riktlinje för att jämföra pizzerior och urval, inte som en exakt sanning i varje enskilt fall.';
      }

      function skapaKort(rubrik, label, modifier, infoText) {
        var card = document.createElement('article');
        card.className = 'stat-card ' + modifier;
        var infoTextForPopup = formateraInfoText(infoText);

        var labelEl = document.createElement('p');
        labelEl.className = 'stat-card-label';
        labelEl.textContent = label;

        var h2 = document.createElement('h2');
        h2.textContent = rubrik;

        card.appendChild(labelEl);
        card.appendChild(h2);

        if (infoTextForPopup) {
          var infoBtn = document.createElement('button');
          infoBtn.type = 'button';
          infoBtn.className = 'stat-info-btn';
          infoBtn.setAttribute('aria-label', 'Information om denna statistik');
          infoBtn.textContent = '?';
          infoBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            var popup = document.getElementById('stat-info-popup');
            if (!popup) return;
            if (!popup.classList.contains('hidden') && popup._sourceBtn === infoBtn) {
              popup.classList.add('hidden');
              return;
            }
            popup._sourceBtn = infoBtn;
            popup.textContent = infoTextForPopup;
            popup.classList.remove('hidden');
            var rect = infoBtn.getBoundingClientRect();
            var popW = Math.min(300, window.innerWidth - 16);
            var left = rect.right - popW;
            if (left < 8) left = 8;
            var top = rect.bottom + 8;
            if (top + 180 > window.innerHeight) top = rect.top - 188;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.style.maxWidth = popW + 'px';
          });
          card.appendChild(infoBtn);
        }

        return card;
      }

      /* Info popup singleton */
      (function () {
        var popup = document.createElement('div');
        popup.className = 'stat-info-popup hidden';
        popup.id = 'stat-info-popup';
        document.body.appendChild(popup);
        document.addEventListener('click', function (e) {
          if (!popup.classList.contains('hidden') && !popup.contains(e.target)) {
            popup.classList.add('hidden');
          }
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') popup.classList.add('hidden');
        });
      }());

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function pizzeriaLank(namn) {
        if (!namn) return 'pizzerior';
        var slug = (namn)
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/\b(pizzeria|restaurang|resturang)\b/g, ' ')
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '')
          .replace(/-{2,}/g, '-');
        return 'pizzerior/pizzeria.html?slug=' + encodeURIComponent(slug) + '&pizzeria=' + encodeURIComponent(namn);
      }

    })();
    </script>
